name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 👈 Verify this matches your branch name

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist  # 👈 Must point directly to dist folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
